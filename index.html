<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/src/assets/icon.ico" />
    <title>TMPOS SRL</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') {
          if (window.electron && window.electron.invoke) {
            window.electron.invoke('open:devtools').catch(function() {})
          }
        }
      })

      const isElectron = !!(window.electron && window.electron.invoke)
      const isCapacitor = typeof window.Capacitor !== 'undefined'

      if (!isElectron && !isCapacitor) {
        // Fallback para acceso via red (browser) - window.db y window.electron via API local
        console.log('[Browser] Modo red detectado, configurando API via HTTP...')
        window.__isElectron = false
        const BASE = window.location.origin

        function browserPrint(html) {
          const win = window.open('', '_blank', 'width=480,height=800')
          if (!win) { alert('Permite las ventanas emergentes para imprimir el ticket.'); return }
          win.document.write(html); win.document.close(); win.focus()
          setTimeout(() => { win.print(); setTimeout(() => win.close(), 500) }, 500)
        }
        async function api(action, data = {}) {
          try {
            const res = await fetch(BASE + '/api/' + action, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data),
            })
            if (!res.ok) throw new Error('HTTP ' + res.status)
            return res.json()
          } catch (e) { console.error('[API Error] ' + action + ':', e); throw e }
        }
        function getUsuario() { try { return localStorage.getItem('mr_user_usuario') || '' } catch { return '' } }
        window.db = {
          getAll: (tabla) => api('db/getAll', { tabla }),
          getById: (tabla, id) => api('db/getById', { tabla, id }),
          insert: (tabla, data) => api('db/insert', { tabla, data, usuario: getUsuario() }),
          update: (tabla, id, data) => api('db/update', { tabla, id, data, usuario: getUsuario() }),
          delete: (tabla, id) => api('db/delete', { tabla, id, usuario: getUsuario() }),
          bitacoraList: (limite) => api('db/bitacoraList', { limite }),
          bitacoraDeleteAll: () => api('db/bitacoraDeleteAll'),
        }
        window.electron = {
          invoke: (channel, ...args) => {
            if (channel === 'getServerUrl') return Promise.resolve({ success: true, url: BASE })
            if (channel.startsWith('licencia:')) {
              if (channel === 'licencia:getMacAddress') return Promise.resolve({ success: true, data: { mac: '000000000000', cifrada: '' } })
              if (channel === 'licencia:getInfo') return Promise.resolve({ success: true, data: { estado: 'activa', estado_display: 'Activa', nombre_empresa: '', licencia_equipo: '000000000000', dias_restantes: 365, fecha_vencimiento: '', ultima_verificacion: '' } })
              if (channel === 'licencia:getApiKey') return Promise.resolve({ success: true, data: { configurada: false } })
              if (channel === 'licencia:setApiKey') return Promise.resolve({ success: true })
              if (channel === 'licencia:registrar') return Promise.resolve({ success: true, data: { mensaje: 'Licencia registrada correctamente' } })
              if (channel === 'licencia:verificar') return Promise.resolve({ success: true, estado: 'activo', data: { estado: 'activo', mensaje: 'Licencia activa - 365 dia(s) restantes', diasRestantes: 365 } })
              return Promise.resolve({ success: false, error: 'No disponible en red' })
            }
            if (channel === 'enviar:testEmail') return Promise.resolve({ success: true, message: 'Correo de prueba enviado (simulado)' })
            if (channel === 'consultaservidor' && args[0] === 'getAllConfig') {
              return Promise.resolve({ VITE_LINKURL: BASE, VITE_LINK_API: BASE + '/api', VITE_TOKEN: '', VITE_PATRON_TELEFONO: '^[0-9]{10}$', VITE_IMPRESORA_LOCAL: '', VITE_PATRON_CEDULA: '^[0-9]{11}$', VITE_TOKEN_CORTO: '' })
            }
            if (channel === 'print:ticket') { browserPrint(args[0]); return Promise.resolve({ success: true }) }
            if (channel === 'generate:pdf') return Promise.resolve({ success: true, dataUrl: '' })
            if (channel === 'pdf:generateToFile') return Promise.resolve({ success: true, filePath: '' })
            if (channel === 'save:pdf') return Promise.resolve({ success: true })
            if (channel === 'backup:create') return Promise.resolve({ success: true })
            if (channel === 'getPrinters') return Promise.resolve({ success: true, data: [] })
            if (channel === 'scan:bluetooth') return Promise.resolve({ success: true, data: [] })
            console.warn('[Browser] Accion no disponible:', channel, args)
            return Promise.resolve({ success: false, error: 'No disponible en red' })
          },
          send: () => {},
          on: () => {},
        }
        console.log('[Browser] API via HTTP configurada correctamente en:', BASE)
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
